<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mockingly // Secure the Bag</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="blob-c">
    <div class="shape-blob"></div>
    <div class="shape-blob one"></div>
    <div class="shape-blob two"></div>
</div>

<div class="container d-flex justify-content-center align-items-center min-vh-100">
    <div class="main-card p-4 p-md-5">
        <div class="text-center mb-4">
            <h1 class="logo-text">Mockly<span>.</span></h1>
            <div class="badge-pill">INTERVIEW READY ⚡</div>
        </div>

        <div class="auth-toggle-container mb-4">
            <button id="showLogin" class="toggle-btn active">Login</button>
            <button id="showSignup" class="toggle-btn">Signup</button>
        </div>

        <div class="auth-wrapper">
            <div id="loginSection" class="auth-box fade-in-up">
                <form id="loginForm">
                    <div class="input-group-custom">
                        <i data-lucide="mail"></i>
                        <input type="email" id="loginEmail" placeholder="Email address" required>
                    </div>
                    <div class="input-group-custom">
                        <i data-lucide="lock"></i>
                        <input type="password" id="loginPassword" placeholder="Password" required>
                    </div>
                    <button type="submit" class="btn-main mt-3">
                        Start Cooking <i data-lucide="arrow-right"></i>
                    </button>
                </form>
            </div>

            <div id="signupSection" class="auth-box d-none">
                <form id="signupForm">
                    <div class="input-group-custom">
                        <i data-lucide="user"></i>
                        <input type="text" id="signupName" placeholder="Full Name" required>
                    </div>
                    <div class="input-group-custom">
                        <i data-lucide="mail"></i>
                        <label for="signupEmail"></label><input type="email" id="signupEmail" placeholder="Email" required>
                    </div>
                    <div class="input-group-custom">
                        <i data-lucide="lock"></i>
                        <input type="password" id="signupPassword" placeholder="Create Password" required>
                    </div>
                    <button type="submit" class="btn-main mt-3">
                        Join the Squad <i data-lucide="sparkles"></i>
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>

<script type="text/javascript" src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
<script src="js/auth.js"></script>
</body>
</html>
